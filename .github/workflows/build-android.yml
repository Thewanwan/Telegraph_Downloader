name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Generate Android platform
        run: |
          flutter create --project-name telegraph_downloader --org com.telegraph --platforms=android /tmp/flutter_temp
          cp -r /tmp/flutter_temp/android android

      - name: Install dependencies
        run: flutter pub get

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp build/app/outputs/flutter-apk/app-release.apk "build/telegraph_${VERSION}.apk"
          echo "Renamed to telegraph_${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-downloader-android
          path: build/telegraph_*.apk

      - name: Release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/telegraph_*.apk
