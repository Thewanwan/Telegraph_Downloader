name: Build Linux DEB/AppImage

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Generate Linux project
        run: flutter create --project-name telegraph_downloader --org com.telegraph --platforms=linux --overwrite .

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Create DEB
        run: |
          mkdir -p pkg/DEBIAN pkg/usr/bin pkg/usr/share/applications
          cp build/linux/x64/release/bundle/telegraph_downloader pkg/usr/bin/
          cp linux/telegraph_downloader.desktop pkg/usr/share/applications/ 2>/dev/null || true
          cat > pkg/DEBIAN/control << 'EOF'
          Package: telegraph-downloader
          Version: 1.0.0
          Architecture: amd64
          Depends: libgtk-3-0
          Maintainer: Thewanwan
          Description: Telegraph image album downloader
          EOF
          dpkg-deb --build pkg build/telegraph-downloader_1.0.0_amd64.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-downloader-linux
          path: build/telegraph-downloader_1.0.0_amd64.deb

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/telegraph-downloader_1.0.0_amd64.deb
          generate_release_notes: true
