name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Generate Windows platform
        shell: pwsh
        run: |
          flutter create --project-name telegraph_downloader --org com.telegraph --platforms=windows C:\temp\flutter_temp
          xcopy C:\temp\flutter_temp\windows windows /E /I /Y

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content pubspec.yaml -Raw
          if ($content -match 'version:\s+(\S+)') {
            $ver = $Matches[1].Split('+')[0]
            echo "version=$ver" >> $env:GITHUB_OUTPUT
            Write-Output "Version: $ver"
          }

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releaseDir = "build\windows\x64\runner\Release"
          $zipPath = "build\TelegraphDownloader_v${version}_windows.zip"
          
          # List files in release directory
          Get-ChildItem $releaseDir | ForEach-Object { Write-Output "$($_.Name) - $($_.Length) bytes" }
          
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipPath
          Write-Output "Created: $zipPath"
          $zipSize = (Get-Item $zipPath).Length
          Write-Output "ZIP size: $zipSize bytes"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-downloader-windows
          path: build/TelegraphDownloader_v*_windows.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/TelegraphDownloader_v*_windows.zip
