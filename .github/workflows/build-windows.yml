name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Detect Visual Studio version
        shell: pwsh
        run: |
          $vsPath = & "C:\ProgramData\Chocolatey\bin\vswhere.exe" -products * -requires Microsoft.Component.MSBuild -property installationPath -latest
          Write-Output "VS Path: $vsPath"
          if ($vsPath -match "Visual Studio\\(\d+)") {
            $vsNum = $Matches[1]
            Write-Output "VS Version Number: $vsNum"
            if ($vsNum -eq "18") {
              $env:CMAKE_GENERATOR = "Visual Studio 18 2025"
              Write-Output "Set CMAKE_GENERATOR to Visual Studio 18 2025"
            } elseif ($vsNum -eq "17") {
              $env:CMAKE_GENERATOR = "Visual Studio 17 2022"
              Write-Output "Set CMAKE_GENERATOR to Visual Studio 17 2022"
            } elseif ($vsNum -eq "16") {
              $env:CMAKE_GENERATOR = "Visual Studio 16 2019"
              Write-Output "Set CMAKE_GENERATOR to Visual Studio 16 2019"
            }
          }
          echo "CMAKE_GENERATOR=$env:CMAKE_GENERATOR" >> $env:GITHUB_ENV

      - name: Generate Windows platform
        shell: bash
        run: |
          flutter create --project-name telegraph_downloader --org com.telegraph --platforms=windows C:\temp\flutter_temp
          xcopy C:\temp\flutter_temp\windows windows /E /I /Y

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        shell: bash
        run: flutter build windows --release

      - name: Rename EXE
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp build/windows/x64/runner/Release/telegraph_downloader.exe "build/TelegraphDownloader_v${VERSION}.exe"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-downloader-windows
          path: build/TelegraphDownloader_v*.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/TelegraphDownloader_v*.exe
