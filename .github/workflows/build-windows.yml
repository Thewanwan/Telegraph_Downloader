name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Generate Windows project
        run: flutter create --project-name telegraph_downloader --org com.telegraph --platforms=windows --overwrite .

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-downloader-windows
          path: build/windows/x64/runner/Release/

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/windows/x64/runner/Release/telegraph_downloader.exe
