name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Generate Windows platform
        shell: pwsh
        run: |
          flutter create --project-name telegraph_downloader --org com.telegraph --platforms=windows C:\temp\flutter_temp
          xcopy C:\temp\flutter_temp\windows windows /E /I /Y

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content pubspec.yaml -Raw
          if ($content -match 'version:\s+(\S+)') {
            $ver = $Matches[1].Split('+')[0]
            echo "version=$ver" >> $env:GITHUB_OUTPUT
            Write-Output "Version: $ver"
          }

      - name: Install dependencies
        run: flutter pub get

      - name: Patch CMake generator
        shell: pwsh
        run: |
          $cmakePath = "windows\CMakeLists.txt"
          if (Test-Path $cmakePath) {
            $content = Get-Content $cmakePath -Raw
            Write-Output "=== Before ==="
            Write-Output $content.Substring(0, [Math]::Min(500, $content.Length))
          }
          
          $flutterCmake = "windows\flutter\CMakeLists.txt"
          if (Test-Path $flutterCmake) {
            $content = Get-Content $flutterCmake -Raw
            Write-Output "=== Flutter CMake ==="
            Write-Output $content.Substring(0, [Math]::Min(1000, $content.Length))
          }

      - name: Build Windows
        shell: pwsh
        run: |
          $env:CMAKE_GENERATOR = "Visual Studio 18 2025"
          flutter build windows --release

      - name: Rename EXE
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $src = "build\windows\x64\runner\Release\telegraph_downloader.exe"
          $dst = "build\TelegraphDownloader_v${version}.exe"
          Copy-Item $src $dst
          Write-Output "Renamed to $dst"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-downloader-windows
          path: build/TelegraphDownloader_v*.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/TelegraphDownloader_v*.exe
