name: Build iOS IPA

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Generate iOS platform
        run: |
          flutter create --project-name telegraph_downloader --org com.telegraph --platforms=ios /tmp/flutter_temp
          cp -r /tmp/flutter_temp/ios ios

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (debug for simulator)
        run: flutter build ios --debug --simulator

      - name: Create ZIP
        run: |
          SIM_DIR=$(find build -path "*/Runner.app" -type d | head -1)
          if [ -z "$SIM_DIR" ]; then
            echo "Runner.app not found, listing build contents:"
            find build -type d | head -30
            exit 1
          fi
          cd "$(dirname "$SIM_DIR")"
          zip -r "$GITHUB_WORKSPACE/build/TelegraphDownloader-iOS.zip" Runner.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-downloader-ios
          path: build/TelegraphDownloader-iOS.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/TelegraphDownloader-iOS.zip
