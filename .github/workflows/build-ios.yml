name: Build iOS IPA

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Generate iOS project
        run: flutter create --project-name telegraph_downloader --org com.telegraph --platforms=ios --overwrite .

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (debug for simulator)
        run: flutter build ios --debug --simulator

      - name: Find and zip iOS build
        run: |
          IOS_DIR=$(find build -type d -name "ios" | head -1)
          echo "Found iOS build dir: $IOS_DIR"
          find build -name "Runner.app" -type d
          SIM_DIR=$(find build -path "*/ios*/Runner.app" -type d | head -1)
          if [ -z "$SIM_DIR" ]; then
            echo "Runner.app not found, listing build contents:"
            find build -type f -name "*.app" 2>/dev/null
            find build -type d 2>/dev/null | head -50
            exit 1
          fi
          cd "$(dirname "$SIM_DIR")"
          zip -r "$GITHUB_WORKSPACE/build/TelegraphDownloader-iOS.zip" Runner.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-downloader-ios
          path: build/TelegraphDownloader-iOS.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/TelegraphDownloader-iOS.zip
