name: Build iOS IPA

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Generate iOS project
        run: flutter create --project-name telegraph_downloader --platforms=ios .

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (simulator)
        run: flutter build ios --release --simulator

      - name: Create ZIP
        run: |
          cd build/ios/iosimulator
          zip -r ../../TelegraphDownloader-iOS-Simulator.zip Runner.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-downloader-ios
          path: build/TelegraphDownloader-iOS-Simulator.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/TelegraphDownloader-iOS-Simulator.zip
          generate_release_notes: true
