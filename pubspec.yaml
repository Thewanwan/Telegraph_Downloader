name: telegraph_downloader
description: A cross-platform tool to batch download image albums from Telegraph.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.0
  path: ^1.9.0
  html: ^0.15.4
  image: ^4.1.0
  shared_preferences: ^2.2.0
  permission_handler: ^11.0.0
  open_file: ^3.3.0
  url_launcher: ^6.2.0
  flutter_local_notifications: ^17.0.0
  provider: ^6.1.0
  dynamic_color: ^1.7.0
  window_manager: ^0.3.0
  archive: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.otf
        - asset: assets/fonts/NotoSansSC-Medium.otf
          weight: 500
        - asset: assets/fonts/NotoSansSC-Bold.otf
          weight: 700
