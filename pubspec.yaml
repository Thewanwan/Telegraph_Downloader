name: telegraph_downloader
description: A cross-platform tool to batch download image albums from Telegraph.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path: ^1.9.0
  html: ^0.15.4
  shared_preferences: ^2.2.0
  file_picker: ^6.1.0
  provider: ^6.1.0
  dynamic_color: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
